# ============================================================
# Sudha Dental Clinic - Application Properties
# ============================================================

server.port=8081

# --- DataSource ---
spring.datasource.url=jdbc:postgresql://localhost:5432/sudha_clinic
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- File Upload ---
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# --- Clinic PIN Authentication ---
clinic.pin=1234

# --- X-Ray Upload Directory ---
clinic.xray.upload-dir=./uploads/xrays

# --- Meta WhatsApp Cloud API ---
meta.whatsapp.base-url=https://graph.facebook.com/v19.0
meta.whatsapp.phone-number-id=YOUR_PHONE_NUMBER_ID
meta.whatsapp.access-token=YOUR_ACCESS_TOKEN
meta.whatsapp.template-name=appointment_reminder
meta.whatsapp.template-language=en_US

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
